<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>

    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        :root { --accent:#5b7fff; --text:#111827; --muted:#6b7280; }
        body { font-family:'DM Sans',sans-serif; }
        nav { display:flex; justify-content:space-between; padding:18px 10px; margin-bottom:20px; }
        .logo { font-family:'Instrument Serif'; font-size:1.2rem; }
    </style>
</head>

<body>

<div class="layout">

    <!-- 사이드바 유지 -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="content">

        <div>
            <nav>
                <div class="logo">do<span style="color:#5b7fff">·</span>it</div>
            </nav>

            <h3 class="mb-4">⚙ 사용자 설정</h3>

            <div class="panel">

                <h5>로그인 정보</h5>
                <hr>



                <p>
                    <strong>이메일:</strong>
                    <span th:text="${email}">-</span>
                </p>

                <hr>

                <a th:href="@{/logout}" class="btn btn-danger">
                    로그아웃
                </a>

            </div>
        </div>

    </div>

</div>

</body>
</html>
