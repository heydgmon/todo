<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="sidebar" class="sidebar">

    <div class="logo">
        <a th:href="@{/}" style="text-decoration:none; color:#1a1a1a;">
            do<span style="color:#5b7fff">·</span>it
        </a>
    </div>

    <ul class="menu">
        <li>
            <a th:href="@{/dashboard}">📊 대시보드</a>
        </li>
        <li>
            <a th:href="@{/calendar}">📅 캘린더</a>
        </li>
        <li>
            <a th:href="@{/todo}">📝 할 일 관리</a>
        </li>
        <li>
            <a th:href="@{/workspace}" onclick="if(window.__loggedIn!==true){event.preventDefault();document.getElementById('wsLoginAlert').style.display='flex';}">👥 워크스페이스</a>
        </li>
        <li>
            <a th:href="@{/settings}">
                ⚙ 설정
            </a>
        </li>
    </ul>

    <!-- 오른쪽 하단 도움말 버튼 (position:fixed이므로 sidebar 안에 있어도 화면 우하단에 표시됨) -->
    <a th:href="@{/guide}" class="help-fab" title="사용 가이드">?</a>

    <!-- 로그인 필요 팝업 -->
    <div id="wsLoginAlert" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);z-index:9999;justify-content:center;align-items:center;" onclick="if(event.target===this)this.style.display='none'">
        <div style="background:#fff;border-radius:20px;padding:36px 32px 28px;max-width:360px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.15);">
            <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#dbeafe,#bfdbfe);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.5rem;">🔒</div>
            <h4 style="font-size:1.05rem;font-weight:600;color:#111827;margin-bottom:8px;">로그인이 필요합니다</h4>
            <p style="font-size:0.88rem;color:#6b7280;margin-bottom:24px;line-height:1.5;">워크스페이스는 로그인 후<br>사용할 수 있는 기능입니다.</p>
            <a href="/oauth2/authorization/cognito" style="display:inline-block;background:linear-gradient(135deg,#5b7fff,#7c9cff);color:#fff;border:none;padding:10px 36px;border-radius:12px;font-size:0.9rem;font-weight:500;cursor:pointer;text-decoration:none;">로그인하기</a>
            <div style="margin-top:12px;">
                <button onclick="document.getElementById('wsLoginAlert').style.display='none'" style="background:none;border:none;color:#6b7280;font-size:0.82rem;cursor:pointer;">닫기</button>
            </div>
        </div>
    </div>

</div>

</body>
</html>
