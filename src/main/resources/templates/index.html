<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todo Service</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
            overflow-x: hidden;
        }

        /* 🔥 HERO */
        .hero {
            padding: 100px 20px;
            text-align: center;
            background: linear-gradient(135deg, #4facfe, #00c6ff);
            color: white;
        }

        .hero h1 {
            animation: fadeUp 1s ease;
        }

        .hero p {
            animation: fadeUp 1.2s ease;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* 🔥 카드 */
        .card-box {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            transform: translateY(20px);
            opacity: 0;
        }

        .card-box:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 12px 25px rgba(0,0,0,0.1);
        }

        /* 🔥 미니 UI 느낌 */
        .preview {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            text-align: left;
            font-size: 0.9rem;
        }

        .section-title {
            text-align: center;
            margin-bottom: 40px;
            font-weight: bold;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<!-- 🔥 HERO -->
<div class="hero">
    <h1 class="display-5 fw-bold">Work smarter.</h1>
    <p class="lead mt-2">Todo · Calendar · Dashboard</p>

    <div class="mt-4">
        <a href="/dashboard" class="btn btn-light btn-lg me-2">
            🚀 Start
        </a>
        <a href="/oauth2/authorization/cognito" class="btn btn-outline-light btn-lg">
            Login
        </a>
    </div>
</div>

<!-- 🔥 FEATURES -->
<div class="container my-5">

    <div class="row g-4">

        <!-- DASHBOARD -->
        <div class="col-md-4">
            <div class="card-box text-center">
                <h5>📊 Dashboard</h5>

                <div class="preview">
                    📌 Today: 1<br>
                    📅 Week: 2<br>
                    ⏰ Delay: 0
                </div>

                <a href="/dashboard" class="btn btn-primary btn-sm mt-3">Open</a>
            </div>
        </div>

        <!-- CALENDAR -->
        <div class="col-md-4">
            <div class="card-box text-center">
                <h5>📅 Calendar</h5>

                <div class="preview">
                    🔴 03/17<br>
                    🟢 03/18
                </div>

                <a href="/calendar" class="btn btn-success btn-sm mt-3">Open</a>
            </div>
        </div>

        <!-- TODO -->
        <div class="col-md-4">
            <div class="card-box text-center">
                <h5>📝 Tasks</h5>

                <div class="preview">
                    🔥 Meeting<br>
                    🌿 Routine
                </div>

                <a href="/todo" class="btn btn-dark btn-sm mt-3">Open</a>
            </div>
        </div>

    </div>
</div>

<!-- 🔥 애니메이션 -->
<script>
    const boxes = document.querySelectorAll('.card-box');

    boxes.forEach((box, i) => {
        setTimeout(() => {
            box.style.opacity = 1;
            box.style.transform = "translateY(0)";
        }, i * 150);
    });
</script>

</body>
</html>
