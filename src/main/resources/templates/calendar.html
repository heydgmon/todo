<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Calendar</title>

    <!-- 공통 레이아웃 CSS -->
    <link rel="stylesheet" th:href="@{/css/layout.css}">

    <!-- FullCalendar -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <style>

        /* TODAY 강조 */
        .fc-day-today {
            background-color: #e0f2fe !important;
            border: 2px solid #0ea5e9 !important;
        }

        /* 날짜 hover 효과 (선택사항 - UI 좋아짐) */
        .fc-daygrid-day:hover {
            background-color: #f1f5f9;
        }

    </style>
</head>

<body>

<div class="layout">

    <!-- 사이드바 -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- 메인 -->
    <div class="content">

        <h3 class="mb-4"></h3>

        <div id="calendar" class="panel"></div>

    </div>

</div>


<!-- 일정 등록 모달 -->
<div class="modal fade" id="todoModal" tabindex="-1">
    <div class="modal-dialog">
        <form method="post" th:action="@{/todoNew}">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">일정 등록</h5>
                    <button type="button" class="btn-close"
                            data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" name="dueDate" id="selectedDate">

                    <!-- 제목 -->
                    <div class="mb-3">
                        <input type="text"
                               name="title"
                               class="form-control"
                               placeholder="제목"
                               required>
                    </div>

                    <!-- 설명 -->
                    <div class="mb-3">
                        <textarea name="description"
                                  class="form-control"
                                  placeholder="설명"></textarea>
                    </div>

                    <!-- 우선순위 -->
                    <div class="mb-3">
                        <label class="form-label">우선순위</label>
                        <select name="priority" class="form-control">
                            <option value="LOW">LOW</option>
                            <option value="MEDIUM">MEDIUM</option>
                            <option value="HIGH">HIGH</option>
                        </select>
                    </div>



                    <!-- 반복 -->
                    <div class="mb-3">
                        <label class="form-label">반복 일정</label>
                        <select name="repeatType" class="form-control">
                            <option value="NONE">없음</option>
                            <option value="DAILY">매일</option>
                            <option value="WEEKLY">매주</option>
                            <option value="MONTHLY">매월</option>
                        </select>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">저장</button>
                </div>

            </div>
        </form>
    </div>
</div>


<script>
    document.addEventListener('DOMContentLoaded', function () {

        const calendarEl = document.getElementById('calendar');

        const calendar = new FullCalendar.Calendar(calendarEl, {

            initialView: 'dayGridMonth',

            height: 650,

            showNonCurrentDates: false,

            events: '/api/calendar/todo',

            editable: true, // ⭐ 드래그 이동 활성화

            eventDrop: function(info) {

                const id = info.event.id;
                const newDate = info.event.startStr;

                fetch('/api/calendar/updateDate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        id: id,
                        date: newDate
                    })
                });

            },
            //달력 클릭 시 상세 내용 확인 가능
           eventClick: function(info) {

           const title = info.event.title;
           const description = info.event.extendedProps.description;

           alert(title + "\n\n" + description);

            },


            dateClick: function(info) {

                document.getElementById("selectedDate").value = info.dateStr;

                const modal = new bootstrap.Modal(
                    document.getElementById('todoModal')
                );

                modal.show();
            }

        });

        calendar.render();

    });
</script>

</body>
</html>
