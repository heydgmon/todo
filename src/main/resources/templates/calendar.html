<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Calendar</title>

    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- FullCalendar -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        :root {
          --accent: #5b7fff;
          --text: #111827;
          --muted: #6b7280;
        }

        body {
          font-family: 'DM Sans', sans-serif;
        }

        nav {
          display:flex;
          justify-content:space-between;
          padding:18px 10px;
          margin-bottom:20px;
        }

        .logo {
          font-family: 'Instrument Serif';
        }

        #calendar {
          margin-top:20px;
        }

        .fc-day-today {
          background-color: #eef2ff !important;
          border: 2px solid #5b7fff !important;
        }

        .fc-daygrid-day:hover {
          background-color: #f9fafb;
        }

        .fc-button {
          background:#5b7fff !important;
          border:none !important;
          border-radius:8px !important;
        }

        .fc-toolbar-title {
          font-weight:600;
        }

        .muted {
          color:#6b7280;
        }

        /* 지도 */
        #map-wrap {
            width: 100%;
            height: 250px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #ddd;
            margin-bottom: 10px;
            background: #f3f4f6;
        }

        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>

<div class="layout">

    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

    <div class="content">

        <div>

            <nav>
                <div class="logo">do<span style="color:#5b7fff">·</span>it</div>
            </nav>

            <h2>Calendar</h2>
            <p class="muted">일정을 한눈에 확인하세요</p>

            <div id="calendar"></div>

        </div>

    </div>

</div>

<!-- 일정 등록 모달 -->
<div class="modal fade" id="todoModal" tabindex="-1">
    <div class="modal-dialog">
        <form method="post" th:action="@{/todoNew}">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">일정 등록</h5>
                    <button type="button" class="btn-close"
                            data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" name="dueDate" id="selectedDate">

                    <div class="mb-3">
                        <input type="text"
                               name="title"
                               class="form-control"
                               placeholder="제목"
                               required>
                    </div>

                    <div class="mb-3">
                        <textarea name="description"
                                  class="form-control"
                                  placeholder="설명"></textarea>
                    </div>

                    <!-- 장소 검색 -->
                    <div class="mb-3">
                        <input type="text"
                               id="place"
                               class="form-control"
                               placeholder="장소 검색 (예: 강남역)">
                    </div>

                    <!-- 지도 -->
                    <div id="map-wrap">
                        <div id="map"></div>
                    </div>

                    <!-- 좌표 -->
                    <input type="hidden" name="lat" id="lat">
                    <input type="hidden" name="lng" id="lng">

                    <div class="mb-3">
                        <label class="form-label">우선순위</label>
                        <select name="priority" class="form-control">
                            <option value="LOW">LOW</option>
                            <option value="MEDIUM">MEDIUM</option>
                            <option value="HIGH">HIGH</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">반복 일정</label>
                        <select name="repeatType" class="form-control">
                            <option value="NONE">없음</option>
                            <option value="DAILY">매일</option>
                            <option value="WEEKLY">매주</option>
                            <option value="MONTHLY">매월</option>
                        </select>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">저장</button>
                </div>

            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {

        const calendarEl = document.getElementById('calendar');

        const calendar = new FullCalendar.Calendar(calendarEl, {

            initialView: 'dayGridMonth',
            height: 650,
            showNonCurrentDates: false,
            events: '/api/calendar/todo',
            editable: true,

            eventDrop: function(info) {
                fetch('/api/calendar/updateDate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        id: info.event.id,
                        date: info.event.startStr
                    })
                });
            },

            eventClick: function(info) {
                alert(info.event.title + "\n\n" + info.event.extendedProps.description);
            },

            dateClick: function(info) {
                document.getElementById("selectedDate").value = info.dateStr;
                new bootstrap.Modal(document.getElementById('todoModal')).show();
            }

        });

        calendar.render();
    });
</script>

<script>
    let map;
    let marker;

    function naverMapReady() {

        const modal = document.getElementById('todoModal');

        modal.addEventListener('shown.bs.modal', function () {

            setTimeout(() => {

                if (!map) {
                    map = new naver.maps.Map('map', {
                        center: new naver.maps.LatLng(37.5665, 126.9780),
                        zoom: 15
                    });
                } else {
                    naver.maps.Event.trigger(map, 'resize');
                }

            }, 300);

        });

        document.getElementById("place").addEventListener("keydown", function(e){
            if(e.key === "Enter"){
                e.preventDefault();
                searchPlace();
            }
        });
    }

    function searchPlace() {

        const query = document.getElementById("place").value;

        fetch(`/api/map/search?query=` + query)
            .then(res => res.json())
            .then(data => {

                if (!data.addresses || data.addresses.length === 0) {
                    alert("검색 결과 없음");
                    return;
                }

                const item = data.addresses[0];

                const lat = item.y;
                const lng = item.x;

                const location = new naver.maps.LatLng(lat, lng);

                map.setCenter(location);

                if (marker) marker.setMap(null);

                marker = new naver.maps.Marker({
                    position: location,
                    map: map
                });

                document.getElementById("lat").value = lat;
                document.getElementById("lng").value = lng;
            });
    }
</script>

<!-- 네이버 지도 -->
<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=ac7wy8wkw8&callback=naverMapReady"></script>

</body>
</html>
