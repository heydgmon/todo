<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Todo</title>

    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script th:src="@{/js/guest-todo.js}"></script>

    <style>
        :root { --accent:#5b7fff; --text:#111827; --muted:#6b7280; --red:#f87171; }
        body { font-family:'DM Sans',sans-serif; }
        nav { display:flex; justify-content:space-between; padding:18px 10px; margin-bottom:20px; }
        .logo { font-family:'Instrument Serif'; }
        .row { display:grid; grid-template-columns: 1fr 2fr; gap:20px; }
        .panel { background:#fff; border:1px solid #e5e7eb; border-radius:16px; padding:24px; }
        .list-item { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #e5e7eb; }
        .muted { color:#6b7280 }
        .btn { padding:6px 12px; border-radius:8px; font-size:0.8rem; border:none; cursor:pointer; }
        .btn-outline { border:1px solid #e5e7eb; background:white; }
        .btn-success { background:#34d399; color:white; }
        .btn-danger { background:#f87171; color:white; }
        .btn-warning { background:#fbbf24; color:white; }
        .btn:hover { opacity:0.9 }
        .add-form { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
        .add-form input, .add-form select { padding:8px 12px; border:1px solid #e5e7eb; border-radius:8px; font-size:0.85rem; }
        .add-form input[type="text"] { flex:1; min-width:150px; }
        .add-form input[type="date"] { width:150px; }
        .guest-banner { background:#fef3c7; border:1px solid #f59e0b; border-radius:10px; padding:10px 16px; margin-bottom:16px; font-size:0.85rem; color:#92400e; }
        .guest-banner a { color:#d97706; font-weight:600; }
        /* ===== 커스텀 팝업 ===== */
.modal-overlay {
    display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.4); backdrop-filter:blur(4px);
    z-index:9999; justify-content:center; align-items:center;
}
.modal-overlay.active { display:flex; animation: fadeIn 0.2s ease; }

.modal-box {
    background:#fff; border-radius:20px; padding:36px 32px 28px;
    max-width:360px; width:90%; text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.15);
    animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
}

.modal-box .modal-icon {
    width:56px; height:56px; border-radius:50%;
    background:linear-gradient(135deg,#fef3c7,#fde68a);
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 16px; font-size:1.5rem;
}

.modal-box h4 {
    font-size:1.05rem; font-weight:600; color:#111827; margin-bottom:8px;
}

.modal-box p {
    font-size:0.88rem; color:#6b7280; margin-bottom:24px; line-height:1.5;
}

.modal-box .modal-btn {
    background:linear-gradient(135deg,#5b7fff,#7c9cff);
    color:#fff; border:none; padding:10px 36px; border-radius:12px;
    font-size:0.9rem; font-weight:500; cursor:pointer;
    transition:transform 0.15s, box-shadow 0.15s;
}
.modal-box .modal-btn:hover {
    transform:translateY(-1px);
    box-shadow:0 4px 16px rgba(91,127,255,0.4);
}

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    </style>
</head>

<body>

<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

    <div class="content">
        <div>
            <nav>
                <div class="logo">do<span style="color:#5b7fff">·</span>it</div>
            </nav>

            <h2>Todo</h2>
            <p class="muted">할 일을 관리하세요</p>

            <div class="row">

                <!-- ===== 좌측 패널 ===== -->
                <div class="panel">
                    <h5>📋 Overview</h5>

                    <!-- 서버 모드 -->
                    <div class="server-only" th:if="${loggedIn}">
                        <p>전체 : <strong th:text="${todos.size()}"></strong></p>
                        <p>완료 : <strong th:text="${#lists.size(todos.?[completed])}"></strong></p>
                        <p>미완료 : <strong th:text="${todos.size() - #lists.size(todos.?[completed])}"></strong></p>
                    </div>

                    <!-- 게스트 모드 -->
                    <div id="guest-overview" class="guest-only" style="display:none;">
                        <p>전체 : <strong id="g-total">0</strong></p>
                        <p>완료 : <strong id="g-done">0</strong></p>
                        <p>미완료 : <strong id="g-undone">0</strong></p>
                    </div>

                    <hr>

                    <!-- 검색 -->
                    <div class="server-only" th:if="${loggedIn}">
                        <form method="get" action="/todo">
                            <input type="text" name="q" class="form-control" placeholder="검색">
                        </form>
                    </div>
                    <div id="guest-search" class="guest-only" style="display:none;">
                        <input type="text" id="g-search-input" placeholder="검색"
                               style="width:100%;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;">
                    </div>

                    <hr>
                    <h6>📂 필터</h6>

                    <!-- 서버 모드 필터 -->
                    <div class="server-only" th:if="${loggedIn}" style="display:flex; flex-direction:column; gap:8px;">
                        <a href="/todo" class="btn btn-outline">전체</a>
                        <a href="/todo/today" class="btn btn-outline">오늘</a>
                        <a href="/todo/week" class="btn btn-outline">이번주</a>
                    </div>

                    <!-- 게스트 모드 필터 -->
                    <div id="guest-filters" class="guest-only" style="display:none; flex-direction:column; gap:8px;">
                        <button class="btn btn-outline" onclick="guestRender('all')">전체</button>
                        <button class="btn btn-outline" onclick="guestRender('today')">오늘</button>
                        <button class="btn btn-outline" onclick="guestRender('week')">이번주</button>
                    </div>
                </div>

                <!-- ===== 우측 리스트 패널 ===== -->
                <div class="panel">
                    <h5>📝 Todo 목록</h5>

                    <!-- 게스트 배너 -->
                    <div id="guest-banner" class="guest-banner guest-only" style="display:none;">
                        💡 게스트 모드입니다. 데이터는 이 브라우저에만 저장됩니다.
                        <a href="/oauth2/authorization/cognito">로그인</a>하면 클라우드에 저장됩니다.
                    </div>

                    <!-- ===== 추가 폼: 게스트용 (JS) ===== -->
                    <div id="guest-add" class="guest-only" style="display:none;">
                        <div class="add-form">
                            <input type="text" id="g-title" placeholder="할 일 제목">
                            <input type="date" id="g-deadline">
                            <select id="g-priority">
                                <option value="LOW">🌿 LOW</option>
                                <option value="MEDIUM">⚡ MEDIUM</option>
                                <option value="HIGH">🔥 HIGH</option>
                            </select>
                            <button class="btn btn-success" onclick="guestAdd()">추가</button>
                        </div>
                    </div>

                    <!-- ===== 추가 폼: 로그인용 (서버 POST) ===== -->
                    <div th:if="${loggedIn}">
                        <form method="post" action="/todo/add" class="add-form">
                            <input type="text" name="title" placeholder="할 일 제목" required>
                            <input type="date" name="deadline">
                            <select name="priority">
                                <option value="LOW">🌿 LOW</option>
                                <option value="MEDIUM">⚡ MEDIUM</option>
                                <option value="HIGH">🔥 HIGH</option>
                            </select>
                            <button type="submit" class="btn btn-success">추가</button>
                        </form>
                    </div>

                    <!-- 서버 모드 리스트 -->
                    <div id="todoList" class="server-only" th:if="${loggedIn}">
                        <div th:each="todo : ${todos}"
                             th:attr="data-id=${todo.id}"
                             class="list-item">
                            <div>
                                <span th:if="${todo.priority == 'HIGH'}">🔥</span>
                                <span th:if="${todo.priority == 'MEDIUM'}">⚡</span>
                                <span th:if="${todo.priority == 'LOW'}">🌿</span>
                                <span th:text="${todo.title}"
                                      th:classappend="${todo.completed} ? 'text-decoration-line-through muted'"></span>
                                <small class="muted" th:if="${todo.deadline != null}">
                                    (<span th:text="${todo.deadline}"></span>)
                                </small>
                                <small class="text-info ms-2" th:if="${todo.location != null}">
                                    📍 <span th:text="${todo.location}"></span>
                                </small>
                            </div>
                            <div style="display:flex; gap:6px;">
                                <form th:action="@{/todo/toggle/{id}(id=${todo.id})}" method="post">
                                    <button class="btn btn-success">완료</button>
                                </form>
                                <form th:action="@{/todo/delete/{id}(id=${todo.id})}" method="post">
                                    <button class="btn btn-danger">삭제</button>
                                </form>
                                <form action="/todo/deleteRepeat" method="post">
                                    <input type="hidden" name="title" th:value="${todo.title}">
                                    <input type="hidden" name="repeatType" th:value="${todo.repeatType}">
                                    <button class="btn btn-warning">반복삭제</button>
                                </form>
                            </div>
                        </div>
                        <div class="muted" th:if="${#lists.isEmpty(todos)}">할 일이 없습니다</div>
                    </div>

                    <!-- 게스트 모드 리스트 -->
                    <div id="guestTodoList" class="guest-only" style="display:none;"></div>
                </div>

            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    window.__loggedIn = /*[[${loggedIn}]]*/ false;
</script>

<script>
    document.addEventListener('DOMContentLoaded', function () {

        var isGuest = GuestTodo.isGuest();

        if (isGuest) {
            var guestEls = document.querySelectorAll('.guest-only');
            for (var i = 0; i < guestEls.length; i++) {
                if (guestEls[i].id === 'guest-filters') {
                    guestEls[i].style.display = 'flex';
                } else {
                    guestEls[i].style.display = 'block';
                }
            }

            guestRender('all');

            document.getElementById('g-search-input').addEventListener('input', function () {
                guestRender('search', this.value);
            });

            document.getElementById('g-title').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); guestAdd(); }
            });

            Sortable.create(document.getElementById('guestTodoList'), {
                animation: 150,
                onEnd: function () {
                    var ids = [];
                    var items = document.querySelectorAll('#guestTodoList > div');
                    for (var j = 0; j < items.length; j++) ids.push(items[j].dataset.id);
                    GuestTodo.reorder(ids);
                }
            });

        } else {
            var el = document.getElementById("todoList");
            if (el) {
                Sortable.create(el, {
                    animation: 150,
                    onEnd: function () {
                        var ids = [];
                        var items = document.querySelectorAll("#todoList > div");
                        for (var j = 0; j < items.length; j++) ids.push(items[j].dataset.id);
                        fetch("/todo/reorder", {
                            method: "POST",
                            headers: {"Content-Type": "application/json"},
                            body: JSON.stringify(ids)
                        });
                    }
                });
            }
        }
    });

    function guestAdd() {
        var title = document.getElementById('g-title').value.trim();
        if (!title) return;
        GuestTodo.add({
            title: title,
            deadline: document.getElementById('g-deadline').value || null,
            priority: document.getElementById('g-priority').value
        });
        document.getElementById('g-title').value = '';
        document.getElementById('g-deadline').value = '';
        document.getElementById('g-priority').value = 'LOW';
        guestRender('all');
    }

    function guestRender(filter, query) {
        var todos;
        if (filter === 'today') todos = GuestTodo.today();
        else if (filter === 'week') todos = GuestTodo.week();
        else if (filter === 'search') todos = GuestTodo.search(query);
        else todos = GuestTodo.getAll();

        var stats = GuestTodo.stats();
        document.getElementById('g-total').textContent = stats.total;
        document.getElementById('g-done').textContent = stats.completed;
        document.getElementById('g-undone').textContent = stats.incomplete;

        var container = document.getElementById('guestTodoList');
        if (todos.length === 0) {
            container.innerHTML = '<div class="muted" style="padding:12px 0;">할 일이 없습니다</div>';
            return;
        }

        var html = '';
        for (var i = 0; i < todos.length; i++) {
            var t = todos[i];
            var icon = t.priority === 'HIGH' ? '🔥' : t.priority === 'MEDIUM' ? '⚡' : '🌿';
            var titleClass = t.completed ? 'text-decoration-line-through muted' : '';
            var deadline = t.deadline ? ' <small class="muted">(' + t.deadline + ')</small>' : '';
            var locationHtml = t.location ? ' <small style="color:#0ea5e9;">📍 ' + _esc(t.location) + '</small>' : '';
            var btnLabel = t.completed ? '취소' : '완료';
            html += '<div class="list-item" data-id="' + t.id + '">' +
                '<div><span>' + icon + '</span> <span class="' + titleClass + '">' + _esc(t.title) + '</span>' + deadline + locationHtml + '</div>' +
                '<div style="display:flex;gap:6px;">' +
'<button class="btn btn-success" onclick="guestToggle(' + t.id + ')">' + btnLabel + '</button>' +
'<button class="btn btn-danger" onclick="guestRemove(' + t.id + ')">삭제</button>' +
'<button class="btn btn-warning" onclick="guestRemoveRepeat(\'' + _esc(t.title).replace(/'/g, "\\'") + '\',\'' + (t.repeatType || 'NONE') + '\')">반복삭제</button>' +
                '</div></div>';
        }
        container.innerHTML = html;
    }

    function guestToggle(id) { GuestTodo.toggle(id); guestRender('all'); }
    function guestRemove(id) { GuestTodo.remove(id); guestRender('all'); }
    function guestRemoveRepeat(title, repeatType) {
    GuestTodo.removeRepeat(title, repeatType);
    guestRender('all');
}
    function _esc(text) { var d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
</script>
<!-- 커스텀 팝업 -->
<div class="modal-overlay" id="dateAlert">
    <div class="modal-box">
        <div class="modal-icon">📅</div>
        <h4>날짜를 입력하세요</h4>
        <p>할 일의 마감일(연도-월-일)을<br>반드시 선택해 주세요.</p>
        <button class="modal-btn" onclick="closeDateAlert()">확인</button>
    </div>
</div>

<script>
    function closeDateAlert() {
        document.getElementById('dateAlert').classList.remove('active');
    }

    // 로그인 폼 날짜 체크
    document.addEventListener('DOMContentLoaded', function() {
        // 서버 POST 폼
        var serverForm = document.querySelector('form[action="/todo/add"]');
        if (serverForm) {
            serverForm.addEventListener('submit', function(e) {
                var deadline = serverForm.querySelector('input[name="deadline"]');
                if (!deadline || !deadline.value) {
                    e.preventDefault();
                    document.getElementById('dateAlert').classList.add('active');
                }
            });
        }

        // 게스트 추가 버튼 오버라이드
        var origGuestAdd = window.guestAdd;
        window.guestAdd = function() {
            var dl = document.getElementById('g-deadline');
            if (!dl || !dl.value) {
                document.getElementById('dateAlert').classList.add('active');
                return;
            }
            origGuestAdd();
        };
    });

    // 오버레이 클릭으로도 닫기
    document.getElementById('dateAlert').addEventListener('click', function(e) {
        if (e.target === this) closeDateAlert();
    });
</script>
</body>
</html>
