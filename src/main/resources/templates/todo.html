<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Todo</title>

    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        :root {
          --accent:#5b7fff;
          --text:#111827;
          --muted:#6b7280;
          --red:#f87171;
        }

        body{
          font-family:'DM Sans',sans-serif;
        }

        /* NAV */
        nav{
          display:flex;
          justify-content:space-between;
          padding:18px 10px;
          margin-bottom:20px;
        }

        .logo{
          font-family:'Instrument Serif';
        }

        /* grid */
        .row{
          display:grid;
          grid-template-columns: 1fr 2fr;
          gap:20px;
        }

        /* panel */
        .panel{
          background:#fff;
          border:1px solid #e5e7eb;
          border-radius:16px;
          padding:24px;
        }

        /* list */
        .list-item{
          display:flex;
          justify-content:space-between;
          align-items:center;
          padding:12px 0;
          border-bottom:1px solid #e5e7eb;
        }

        /* text */
        .muted{color:#6b7280}

        /* button */
        .btn{
          padding:6px 12px;
          border-radius:8px;
          font-size:0.8rem;
          border:none;
          cursor:pointer;
        }

        .btn-outline{
          border:1px solid #e5e7eb;
          background:white;
        }

        .btn-success{background:#34d399;color:white;}
        .btn-danger{background:#f87171;color:white;}
        .btn-warning{background:#fbbf24;color:white;}

        .btn:hover{opacity:0.9}
    </style>
</head>

<body>

<div class="layout">

    <!-- 사이드바 -->
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

    <!-- 본문 -->
    <div class="content">

        <div>

            <nav>
                <div class="logo">do<span style="color:#5b7fff">·</span>it</div>
            </nav>

            <h2>Todo</h2>
            <p class="muted">할 일을 관리하세요</p>

            <div class="row">

                <!-- 좌측 -->
                <div class="panel">

                    <h5>📋 Overview</h5>

                    <p>전체 : <strong th:text="${todos.size()}"></strong></p>
                    <p>완료 : <strong th:text="${#lists.size(todos.?[completed])}"></strong></p>
                    <p>미완료 : <strong th:text="${todos.size() - #lists.size(todos.?[completed])}"></strong></p>

                    <hr>

                    <form method="get" action="/todo">
                        <input type="text" name="q" class="form-control" placeholder="검색">
                    </form>

                    <hr>

                    <h6>📂 필터</h6>

                    <div style="display:flex; flex-direction:column; gap:8px;">
                        <a href="/todo" class="btn btn-outline">전체</a>
                        <a href="/todo/today" class="btn btn-outline">오늘</a>
                        <a href="/todo/week" class="btn btn-outline">이번주</a>
                    </div>

                </div>

                <!-- 리스트 -->
                <div class="panel">

                    <h5>📝 Todo 목록</h5>

                    <div id="todoList">

                        <div th:each="todo : ${todos}"
                             th:attr="data-id=${todo.id}"
                             class="list-item">

                            <div>

                                <span th:if="${todo.priority == 'HIGH'}">🔥</span>
                                <span th:if="${todo.priority == 'MEDIUM'}">⚡</span>
                                <span th:if="${todo.priority == 'LOW'}">🌿</span>

                                <span th:text="${todo.title}"
                                      th:classappend="${todo.completed} ? 'text-decoration-line-through muted'">
                                </span>

                                <small class="muted" th:if="${todo.deadline != null}">
                                    (<span th:text="${todo.deadline}"></span>)
                                </small>

                                <!-- 장소 추가 -->
                                <small class="text-info ms-2" th:if="${todo.location != null}">
                                    📍 <span th:text="${todo.location}"></span>
                                </small>

                            </div>

                            <div style="display:flex; gap:6px;">

                                <form th:action="@{/todo/toggle/{id}(id=${todo.id})}" method="post">
                                    <button class="btn btn-success">완료</button>
                                </form>

                                <form th:action="@{/todo/delete/{id}(id=${todo.id})}" method="post">
                                    <button class="btn btn-danger">삭제</button>
                                </form>

                                <form action="/todo/deleteRepeat" method="post">
                                    <input type="hidden" name="title" th:value="${todo.title}">
                                    <input type="hidden" name="repeatType" th:value="${todo.repeatType}">
                                    <button class="btn btn-warning">반복삭제</button>
                                </form>

                            </div>

                        </div>

                        <div class="muted" th:if="${#lists.isEmpty(todos)}">
                            할 일이 없습니다
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>
    const el = document.getElementById("todoList");

    Sortable.create(el,{
        animation:150,
        onEnd:function(){
            const ids=[];
            document.querySelectorAll("#todoList > div").forEach(li=>{
                ids.push(li.dataset.id);
            });

            fetch("/todo/reorder",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify(ids)
            });
        }
    });
</script>

</body>
</html>
