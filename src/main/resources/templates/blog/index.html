<!DOCTYPE html>

<head>

    <title>블로그 - do·it</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" th:href="@{/css/guide.css}">

    <style>
        .blog-hero {
            padding:80px 24px 60px; text-align:center;
            background:linear-gradient(180deg, rgba(91,127,255,0.06) 0%, transparent 100%);
        }
        .blog-hero h1 {
            font-family:'Instrument Serif',serif; font-size:clamp(2rem,4vw,3rem);
            letter-spacing:-0.03em; margin-bottom:12px;
        }
        .blog-hero h1 em { color:var(--accent); font-style:normal; }
        .blog-hero p { color:var(--muted); font-size:0.95rem; max-width:560px; margin:0 auto; }
        .blog-grid {
            max-width:800px; margin:0 auto; padding:0 24px 100px;
            display:grid; gap:16px;
        }
        .blog-card {
            background:#ffffff; border:1px solid var(--border); border-radius:14px;
            padding:28px 28px 24px; text-decoration:none; color:var(--text);
            transition:border-color 0.2s, transform 0.2s, box-shadow 0.2s;
        }
        .blog-card:hover {
            border-color:rgba(91,127,255,0.3); transform:translateY(-3px);
            box-shadow:0 8px 24px rgba(0,0,0,0.04); text-decoration:none;
        }
        .blog-date { font-size:0.72rem; color:var(--muted); margin-bottom:6px; }
        .blog-title { font-size:1.1rem; font-weight:600; margin-bottom:8px; line-height:1.4; }
        .blog-excerpt { font-size:0.85rem; color:var(--muted); line-height:1.6; }
        .blog-arrow { color:var(--accent); font-size:0.85rem; margin-top:12px; display:inline-block; transition:transform 0.2s; }
        .blog-card:hover .blog-arrow { transform:translateX(4px); }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-logo">do<span>·</span>it</a>

        <div class="blog-arrow">읽기 →</div>
    </a>

</div>

<footer th:replace="~{fragments/guide-footer :: guide-footer}"></footer>
