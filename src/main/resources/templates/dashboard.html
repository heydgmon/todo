<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script th:src="@{/js/guest-todo.js}"></script>

    <style>
        :root { --accent:#5b7fff; --text:#111827; --muted:#6b7280; --red:#f87171; }
        body { font-family:'DM Sans',sans-serif; }
        nav { display:flex; justify-content:space-between; padding:18px 10px; margin-bottom:20px; }
        .logo { font-family:'Instrument Serif'; font-size:1.2rem; }
        .btn { background:var(--accent); padding:8px 16px; border-radius:8px; color:white; text-decoration:none; }
        .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }
        .card { background:#ffffff; border:1px solid #e5e7eb; border-radius:16px; padding:24px; }
        .highlight { background:linear-gradient(135deg,#5b7fff,#7c9cff); color:white; }
        .list { margin-top:12px; font-size:0.9rem; }
        .list-item { padding:6px 0; border-bottom:1px solid #e5e7eb; }
        .muted { color:#6b7280; }
        .row { display:grid; grid-template-columns:2fr 1fr; gap:20px; margin-top:20px; }
        .section { background:#ffffff; border:1px solid #e5e7eb; border-radius:16px; padding:24px; }
        .guest-banner { background:#fef3c7; border:1px solid #f59e0b; border-radius:10px; padding:10px 16px; margin-bottom:20px; font-size:0.85rem; color:#92400e; }
        .guest-banner a { color:#d97706; font-weight:600; }
    </style>
</head>

<body>

<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

    <div class="content">
        <div>
            <nav>
                <div class="logo">do<span style="color:#5b7fff">·</span>it</div>
            </nav>

            <!-- 게스트 배너 -->
            <div id="guest-banner" class="guest-banner guest-only" style="display:none;">
                💡 게스트 모드입니다. <a href="/oauth2/authorization/cognito">로그인</a>하면 데이터가 클라우드에 저장됩니다.
            </div>

            <h2>Dashboard</h2>
            <p class="muted">오늘 상태 요약</p>

            <!-- ===== 서버 모드 (로그인) ===== -->
            <div class="server-only" th:if="${loggedIn}">
                <div class="grid">
                    <div class="card highlight">
                        <h5>📌 오늘</h5>
                        <h2 th:text="${#lists.size(todayTasks)}">0</h2>
                    </div>
                    <div class="card">
                        <h5>이번 주</h5>
                        <h3 th:text="${#lists.size(weekTasks)}">0</h3>
                    </div>
                    <div class="card">
                        <h5>지연</h5>
                        <h3 style="color:var(--red)" th:text="${#lists.size(overdueTasks)}">0</h3>
                    </div>
                    <div class="card">
                        <h5>요약</h5>
                        <div class="list">
                            <div class="list-item" th:each="task : ${urgentTasks}">
                                <span th:text="${task.title}"></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="section">
                        <h5>📌 오늘 할 일</h5>
                        <div class="list">
                            <div class="list-item" th:each="task : ${todayTasks}" th:text="${task.title}"></div>
                            <div class="muted" th:if="${#lists.isEmpty(todayTasks)}">일정 없음</div>
                        </div>
                        <h5 style="margin-top:20px; color:var(--red)">⏳ 지연</h5>
                        <div class="list">
                            <div class="list-item" th:each="task : ${overdueTasks}">
                                <span th:text="${task.title}"></span>
                            </div>
                            <div class="muted" th:if="${#lists.isEmpty(overdueTasks)}">지연 없음 🎉</div>
                        </div>
                    </div>
                    <div class="section">
                        <h5>💡 Tip</h5>
                        <p class="muted">지연 일정은 자동 강조됩니다.</p>
                        <p class="muted">캘린더를 활용해보세요.</p>
                    </div>
                </div>
            </div>

            <!-- ===== 게스트 모드 ===== -->
            <div id="guest-dashboard" class="guest-only" style="display:none;">
                <div class="grid">
                    <div class="card highlight">
                        <h5>📌 오늘</h5>
                        <h2 id="gd-today">0</h2>
                    </div>
                    <div class="card">
                        <h5>이번 주</h5>
                        <h3 id="gd-week">0</h3>
                    </div>
                    <div class="card">
                        <h5>지연</h5>
                        <h3 style="color:var(--red)" id="gd-overdue">0</h3>
                    </div>
                    <div class="card">
                        <h5>요약</h5>
                        <div class="list" id="gd-urgent"></div>
                    </div>
                </div>
                <div class="row">
                    <div class="section">
                        <h5>📌 오늘 할 일</h5>
                        <div class="list" id="gd-today-list"></div>
                        <h5 style="margin-top:20px; color:var(--red)">⏳ 지연</h5>
                        <div class="list" id="gd-overdue-list"></div>
                    </div>
                    <div class="section">
                        <h5>💡 Tip</h5>
                        <p class="muted">지연 일정은 자동 강조됩니다.</p>
                        <p class="muted">캘린더를 활용해보세요.</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script th:inline="javascript">
    window.__loggedIn = /*[[${loggedIn}]]*/ false;
</script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (!GuestTodo.isGuest()) return; // 로그인이면 서버 렌더링 그대로 사용

        // 게스트 요소 표시
        var guestEls = document.querySelectorAll('.guest-only');
        for (var i = 0; i < guestEls.length; i++) {
            guestEls[i].style.display = 'block';
        }

        var todayTasks = GuestTodo.today().filter(function(t){ return !t.completed; });
        var weekTasks = GuestTodo.week().filter(function(t){ return !t.completed; });
        var overdueTasks = GuestTodo.overdue();
        var urgentTasks = GuestTodo.urgent(5);

        document.getElementById('gd-today').textContent = todayTasks.length;
        document.getElementById('gd-week').textContent = weekTasks.length;
        document.getElementById('gd-overdue').textContent = overdueTasks.length;

        document.getElementById('gd-urgent').innerHTML = urgentTasks.length > 0
            ? urgentTasks.map(function(t){ return '<div class="list-item">' + _esc(t.title) + '</div>'; }).join('')
            : '';

        document.getElementById('gd-today-list').innerHTML = todayTasks.length > 0
            ? todayTasks.map(function(t){ return '<div class="list-item">' + _esc(t.title) + '</div>'; }).join('')
            : '<div class="muted">일정 없음</div>';

        document.getElementById('gd-overdue-list').innerHTML = overdueTasks.length > 0
            ? overdueTasks.map(function(t){ return '<div class="list-item">' + _esc(t.title) + '</div>'; }).join('')
            : '<div class="muted">지연 없음 🎉</div>';
    });

    function _esc(text) {
        var d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }
</script>

</body>
</html>
