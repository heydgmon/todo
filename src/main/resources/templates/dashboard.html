<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todo Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/layout.css}">

    <style>
        body {
            background: #f5f7fb;
        }

        .content {
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 🔥 카드 스타일 개선 */
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }

        /* 🔥 강조 카드 (오늘 할 일) */
        .highlight-card {
            background: linear-gradient(135deg, #4f8cff, #6fa8ff);
            color: white;
        }

        .highlight-card h2 {
            color: white;
        }

        /* 🔥 상단 헤더 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .login-btn {
            border-radius: 10px;
        }

        /* 🔥 리스트 스타일 */
        .list-group-item {
            border: none;
            padding-left: 0;
        }
    </style>
</head>

<body>

<div class="layout">

    <!-- 사이드바 -->
    <aside class="sidebar">
        <div class="logo">일정 관리 앱</div>
        <ul class="menu">
            <li><a th:href="@{/dashboard}">📊 대시보드</a></li>
            <li><a th:href="@{/calendar}">📅 캘린더</a></li>
            <li><a th:href="@{/todo}">📝 할 일 관리</a></li>
            <li><a th:href="@{/settings}">⚙ 설정</a></li>
        </ul>
    </aside>

    <!-- 메인 -->
    <div class="content">
        <div class="container-fluid d-flex flex-column flex-grow-1 p-4">

            <!-- 🔥 상단 헤더 (배너 제거하고 여기에 로그인 배치) -->
            <div class="top-bar d-flex justify-content-end">

                <!-- 로그인 안된 경우 -->
                <a th:if="${#authentication == null}"
                   href="/oauth2/authorization/cognito"
                   class="btn btn-dark">
                    로그인
                </a>

                <!-- 로그인 된 경우 -->
                <div th:if="${#authentication != null}" class="dropdown">

                    <button class="btn btn-outline-dark dropdown-toggle"
                            data-bs-toggle="dropdown">

                        <!-- 이메일 앞부분 표시 -->
                        <span th:text="${#authentication.name.split('@')[0]} + '님'">
                사용자
            </span>

                    </button>

                    <ul class="dropdown-menu dropdown-menu-end">

                        <li>
                            <a class="dropdown-item" href="#">
                                👤 프로필
                            </a>
                        </li>

                        <li><hr class="dropdown-divider"></li>

                        <li>
                            <a class="dropdown-item"
                               href="/logout"
                               onclick="location.href='https://ap-northeast-2abt0vj9bi.auth.ap-northeast-2.amazoncognito.com/logout?client_id=c995189j0efrd7lslclk9k683&logout_uri=http://localhost:8080'; return false;">
                                🚪 로그아웃
                            </a>
                        </li>

                    </ul>
                </div>

            </div>

            <!-- 🔥 통계 카드 -->
            <div class="row mb-4 g-4">

                <!-- 🔥 강조 카드 -->
                <div class="col-md-3">
                    <div class="card p-4 text-center h-100 highlight-card">
                        <h6>📌 오늘 할 일</h6>
                        <h2 class="fw-bold"
                            th:text="${#lists.size(todayTasks)}">0</h2>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-4 text-center h-100">
                        <h6 class="text-muted">이번 주</h6>
                        <h3 class="fw-bold text-success"
                            th:text="${#lists.size(weekTasks)}">0</h3>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-4 text-center h-100">
                        <h6 class="text-muted">지연</h6>
                        <h3 class="fw-bold text-danger"
                            th:text="${#lists.size(overdueTasks)}">0</h3>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-4 h-100">
                        <h6 class="text-muted">📋 요약</h6>
                        <ul class="mb-0 small mt-2">
                            <li th:each="task : ${urgentTasks}">
                                <span th:text="${task.title}"></span>
                                (<span th:text="${task.deadline}"></span>)
                            </li>
                        </ul>
                    </div>
                </div>

            </div>

            <!-- 🔥 하단 영역 -->
            <div class="row g-4">

                <!-- 좌측 -->
                <div class="col-lg-8">
                    <div class="card p-4 h-100">

                        <div class="row">

                            <!-- 오늘 -->
                            <div class="col-md-6">
                                <h6 class="fw-bold">📌 오늘 해야 할 작업</h6>
                                <ul class="list-group mt-3">
                                    <li class="list-group-item"
                                        th:each="task : ${todayTasks}"
                                        th:text="${task.title}">
                                    </li>
                                    <li class="text-muted"
                                        th:if="${#lists.isEmpty(todayTasks)}">
                                        오늘 일정이 없습니다
                                    </li>
                                </ul>
                            </div>

                            <!-- 지연 -->
                            <div class="col-md-6">
                                <h6 class="fw-bold text-danger">⏳ 지연된 작업</h6>
                                <ul class="list-group mt-3">
                                    <li class="list-group-item text-danger"
                                        th:each="task : ${overdueTasks}">
                                        <span th:text="${task.title}"></span>
                                        (<span th:text="${task.deadline}"></span>)
                                    </li>
                                    <li class="text-muted"
                                        th:if="${#lists.isEmpty(overdueTasks)}">
                                        지연된 일정이 없습니다 🎉
                                    </li>
                                </ul>
                            </div>

                        </div>

                    </div>
                </div>

                <!-- 우측 -->
                <div class="col-lg-4">
                    <div class="card p-4 h-100">
                        <h6 class="fw-bold">💡 Tip</h6>
                        <p class="text-muted mt-3">
                            지연 일정은 자동으로 강조됩니다.
                        </p>
                        <p class="text-muted">
                            캘린더에서 일정을 관리해보세요.
                        </p>
                    </div>
                </div>

            </div>

        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
