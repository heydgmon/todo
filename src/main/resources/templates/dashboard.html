<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/guest-todo.js}"></script>

    <style>
        :root { --accent:#5b7fff; --text:#111827; --muted:#6b7280; --red:#f87171; }
        html, body { margin:0; padding:0; }
        body { font-family:'DM Sans',sans-serif; }
        nav { display:flex; justify-content:space-between; padding:18px 10px; margin-bottom:20px; }
        .logo { font-family:'Instrument Serif'; font-size:1.2rem; }
        .btn { background:var(--accent); padding:8px 16px; border-radius:8px; color:white; text-decoration:none; }
        .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }
        .card { background:#ffffff; border:1px solid #e5e7eb; border-radius:16px; padding:24px; }
        .highlight { background:linear-gradient(135deg,#5b7fff,#7c9cff); color:white; }
        .list { margin-top:12px; font-size:0.9rem; }
        .list-item { padding:6px 0; border-bottom:1px solid #e5e7eb; }
        .muted { color:#6b7280; }
        .row { display:grid; grid-template-columns:2fr 1fr; gap:20px; margin-top:20px; }
        .section { background:#ffffff; border:1px solid #e5e7eb; border-radius:16px; padding:24px; }
        .guest-banner { background:#fef3c7; border:1px solid #f59e0b; border-radius:10px; padding:10px 16px; margin-bottom:20px; font-size:0.85rem; color:#92400e; }
        .guest-banner a { color:#d97706; font-weight:600; }

        /* ★ 오늘 숫자 클릭 가능하게 */
        .today-count { cursor:pointer; transition:opacity 0.2s; }
        .today-count:hover { opacity:0.7; }

        /* ★ Todo 모달 스타일 — 캘린더 상세 모달과 동일한 디자인 */
        .todo-modal-item {
            display:flex; align-items:center; justify-content:space-between;
            padding:12px 16px; background:#f9fafb; border:1px solid #e5e7eb;
            border-radius:10px; margin-bottom:8px;
            opacity:0; transform:translateY(12px);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        .todo-modal-item.show {
            opacity:1; transform:translateY(0);
        }
        .todo-modal-item .todo-info { flex:1; }
        .todo-modal-item .todo-title-text { font-size:0.95rem; color:#111827; font-weight:500; }
        .todo-modal-item .todo-meta { font-size:0.78rem; color:#6b7280; margin-top:2px; }
        .todo-modal-item .todo-priority {
            font-size:0.72rem; padding:2px 8px; border-radius:8px; font-weight:600; white-space:nowrap;
        }
        .priority-high { background:#fef2f2; color:#dc2626; }
        .priority-medium { background:#fffbeb; color:#d97706; }
        .priority-low { background:#f0fdf4; color:#16a34a; }
        .todo-empty { text-align:center; color:#9ca3af; padding:30px 0; font-size:0.9rem; }
    </style>
</head>

<body>

<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

    <div class="content">
        <div>
            <nav>
                <div class="logo">do<span style="color:#5b7fff">·</span>it</div>
            </nav>

            <!-- 게스트 배너 -->
            <div id="guest-banner" class="guest-banner guest-only" style="display:none;">
                💡 게스트 모드입니다. <a href="/oauth2/authorization/cognito">로그인</a>하면 데이터가 클라우드에 저장됩니다.
            </div>

            <h2>Dashboard</h2>
            <p class="muted">오늘 상태 요약</p>

            <!-- ===== 서버 모드 (로그인) ===== -->
            <div class="server-only" th:if="${loggedIn}">
                <div class="grid">
                    <div class="card highlight">
                        <h5>📌 오늘</h5>
                        <!-- ★ 클릭 가능한 숫자 -->
                        <h2 class="today-count" onclick="openTodayModal()" th:text="${#lists.size(todayTasks)}">0</h2>
                    </div>
                    <div class="card">
                        <h5>이번 주</h5>
                        <h3 th:text="${#lists.size(weekTasks)}">0</h3>
                    </div>
                    <div class="card">
                        <h5>지연</h5>
                        <h3 style="color:var(--red)" th:text="${#lists.size(overdueTasks)}">0</h3>
                    </div>
                    <div class="card">
                        <h5>요약</h5>
                        <div class="list">
                            <div class="list-item" th:each="task : ${urgentTasks}">
                                <span th:text="${task.title}"></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="section">
                        <h5>📌 오늘 할 일</h5>
                        <div class="list">
                            <div class="list-item" th:each="task : ${todayTasks}" th:text="${task.title}"></div>
                            <div class="muted" th:if="${#lists.isEmpty(todayTasks)}">일정 없음</div>
                        </div>
                        <h5 style="margin-top:20px; color:var(--red)">⏳ 지연</h5>
                        <div class="list">
                            <div class="list-item" th:each="task : ${overdueTasks}">
                                <span th:text="${task.title}"></span>
                            </div>
                            <div class="muted" th:if="${#lists.isEmpty(overdueTasks)}">지연 없음 🎉</div>
                        </div>
                    </div>
                    <div class="section">
                        <h5>💡 Tip</h5>
                        <p class="muted">지연 일정은 자동 강조됩니다.</p>
                        <p class="muted">캘린더를 활용해보세요.</p>
                    </div>
                </div>
            </div>

            <!-- ===== 게스트 모드 ===== -->
            <div id="guest-dashboard" class="guest-only" style="display:none;">
                <div class="grid">
                    <div class="card highlight">
                        <h5>📌 오늘</h5>
                        <!-- ★ 게스트도 클릭 가능 -->
                        <h2 class="today-count" onclick="openTodayModal()" id="gd-today">0</h2>
                    </div>
                    <div class="card">
                        <h5>이번 주</h5>
                        <h3 id="gd-week">0</h3>
                    </div>
                    <div class="card">
                        <h5>지연</h5>
                        <h3 style="color:var(--red)" id="gd-overdue">0</h3>
                    </div>
                    <div class="card">
                        <h5>요약</h5>
                        <div class="list" id="gd-urgent"></div>
                    </div>
                </div>
                <div class="row">
                    <div class="section">
                        <h5>📌 오늘 할 일</h5>
                        <div class="list" id="gd-today-list"></div>
                        <h5 style="margin-top:20px; color:var(--red)">⏳ 지연</h5>
                        <div class="list" id="gd-overdue-list"></div>
                    </div>
                    <div class="section">
                        <h5>💡 Tip</h5>
                        <p class="muted">지연 일정은 자동 강조됩니다.</p>
                        <p class="muted">캘린더를 활용해보세요.</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- ===== ★ [추가] 오늘 Todo 모달 ===== -->
<div class="modal fade" id="todayTodoModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">📌 오늘의 할 일</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="today-todo-list">
                <!-- JS로 채워짐 -->
            </div>
            <div class="modal-footer">
                <a href="/todo" class="btn btn-primary" style="border-radius:10px; font-size:0.85rem;">할 일 관리로 이동</a>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    window.__loggedIn = /*[[${loggedIn}]]*/ false;

    // ★ 서버 모드일 때 todayTasks를 JS 변수로 전달
    window.__todayTasks = /*[[${todayTasks}]]*/ [];
</script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (!GuestTodo.isGuest()) return; // 로그인이면 서버 렌더링 그대로 사용

        // 게스트 요소 표시
        var guestEls = document.querySelectorAll('.guest-only');
        for (var i = 0; i < guestEls.length; i++) {
            guestEls[i].style.display = 'block';
        }

        var todayTasks = GuestTodo.today().filter(function(t){ return !t.completed; });
        var weekTasks = GuestTodo.week().filter(function(t){ return !t.completed; });
        var overdueTasks = GuestTodo.overdue();
        var urgentTasks = GuestTodo.urgent(5);

        document.getElementById('gd-today').textContent = todayTasks.length;
        document.getElementById('gd-week').textContent = weekTasks.length;
        document.getElementById('gd-overdue').textContent = overdueTasks.length;

        document.getElementById('gd-urgent').innerHTML = urgentTasks.length > 0
            ? urgentTasks.map(function(t){ return '<div class="list-item">' + _esc(t.title) + '</div>'; }).join('')
            : '';

        document.getElementById('gd-today-list').innerHTML = todayTasks.length > 0
            ? todayTasks.map(function(t){ return '<div class="list-item">' + _esc(t.title) + '</div>'; }).join('')
            : '<div class="muted">일정 없음</div>';

        document.getElementById('gd-overdue-list').innerHTML = overdueTasks.length > 0
            ? overdueTasks.map(function(t){ return '<div class="list-item">' + _esc(t.title) + '</div>'; }).join('')
            : '<div class="muted">지연 없음 🎉</div>';
    });

    function _esc(text) {
        var d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    /* ===== ★ 오늘 Todo 모달 열기 ===== */
    function openTodayModal() {
        var container = document.getElementById('today-todo-list');
        container.innerHTML = '';

        var tasks = [];

        if (GuestTodo.isGuest()) {
            // 게스트: LocalStorage에서 가져오기
            tasks = GuestTodo.today().map(function(t) {
                return {
                    title: t.title,
                    priority: t.priority || 'LOW',
                    deadline: t.deadline || '',
                    location: t.location || '',
                    completed: t.completed || false
                };
            });
        } else {
            // 서버 모드: Thymeleaf에서 전달받은 데이터
            var raw = window.__todayTasks || [];
            tasks = raw.map(function(t) {
                return {
                    title: t.title,
                    priority: t.priority || 'LOW',
                    deadline: t.deadline || '',
                    location: t.location || '',
                    completed: t.completed || false
                };
            });
        }

        // 미완료만 필터
        tasks = tasks.filter(function(t) { return !t.completed; });

        if (tasks.length === 0) {
            container.innerHTML = '<div class="todo-empty">오늘 할 일이 없습니다 🎉</div>';
        } else {
            tasks.forEach(function(t, idx) {
                var priorityClass = t.priority === 'HIGH' ? 'priority-high' :
                                    t.priority === 'MEDIUM' ? 'priority-medium' : 'priority-low';
                var priorityIcon = t.priority === 'HIGH' ? '🔥' :
                                   t.priority === 'MEDIUM' ? '⚡' : '🌿';

                var metaParts = [];
                if (t.deadline) metaParts.push(t.deadline);
                if (t.location) metaParts.push('📍 ' + t.location);

                var el = document.createElement('div');
                el.className = 'todo-modal-item';
                el.innerHTML =
                    '<div class="todo-info">' +
                        '<div class="todo-title-text">' + _esc(t.title) + '</div>' +
                        (metaParts.length > 0 ? '<div class="todo-meta">' + _esc(metaParts.join(' · ')) + '</div>' : '') +
                    '</div>' +
                    '<span class="todo-priority ' + priorityClass + '">' + priorityIcon + ' ' + t.priority + '</span>';

                container.appendChild(el);

                // ★ 순차 애니메이션: 각 항목을 80ms 간격으로 등장
                setTimeout(function() {
                    el.classList.add('show');
                }, 60 + (idx * 80));
            });
        }

        new bootstrap.Modal(document.getElementById('todayTodoModal')).show();
    }
</script>

</body>
</html>
