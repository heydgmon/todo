<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>워크스페이스</title>
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="content">
        <div class="container mt-4">

            <h3 class="mb-4">👥 워크스페이스</h3>

            <!-- 새 워크스페이스 생성 -->
            <div class="panel mb-4">
                <h5>새 워크스페이스 만들기</h5>
                <form method="post" action="/workspace/create" class="d-flex gap-2 mt-3">
                    <input type="text" name="name" class="form-control"
                           placeholder="워크스페이스 이름" required>
                    <button class="btn btn-primary" style="white-space:nowrap;">생성</button>
                </form>
            </div>

            <!-- 워크스페이스 목록 -->
            <div class="row g-3">
                <div class="col-md-4" th:each="ws : ${workspaces}">
                    <div class="panel">
                        <h5 th:text="${ws.name}">워크스페이스명</h5>
                        <p class="text-muted small">
                            소유자: <span th:text="${ws.owner.name}"></span>
                        </p>
                        <div class="d-flex gap-2">
                            <a th:href="@{/ws/{id}/todo(id=${ws.id})}"
                               class="btn btn-sm btn-outline-primary">📝 할 일</a>
                            <a th:href="@{/workspace/{id}/members(id=${ws.id})}"
                               class="btn btn-sm btn-outline-secondary">👥 멤버 관리</a>
                        </div>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(workspaces)}" class="text-muted text-center">
                    워크스페이스가 없습니다. 위에서 생성해주세요.
                </div>
            </div>

        </div>
    </div>

</div>
</body>
</html>
